<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sneaker Product Gallery</title>
  <link rel="stylesheet" href="gallery.css">
</head>
<body>

  <main style="width: min(30rem, 100%); margin: 2rem auto;">
    <!-- images as real <img> tags so content is visible even before JS loads -->
    <product-gallery aria-label="Product image gallery">
      <img src="Assets/image-product-1.jpg" data-thumb="Assets/image-product-1-thumbnail.jpg" alt="White and tan sneaker, side and sole view">
      <img src="Assets/image-product-2.jpg" data-thumb="Assets/image-product-2-thumbnail.jpg" alt="White and tan sneaker balanced on decorative stones">
      <img src="Assets/image-product-3.jpg" data-thumb="Assets/image-product-3-thumbnail.jpg" alt="Sneaker on decorative stones, angled view">
      <img src="Assets/image-product-4.jpg" data-thumb="Assets/image-product-4-thumbnail.jpg" alt="Sneaker on decorative stones, top view">
    </product-gallery>
  </main>

  <script defer src="gallery.js"></script>

</body>
</html>
